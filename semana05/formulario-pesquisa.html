<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Pesquisa</title>
    <link rel="stylesheet" href="estilos/formulario-pesquisa.css">
</head>

<body>
    <header>
        <h1>Formulário de Pesquisa</h1>
    </header>
    <main>

        <form>

            <fieldset>
                <legend>Informações de Contato</legend>
                <div class="item-formulario coluna2">
                    <label for="nome-completo">Nome Completo:</label>
                    <input type="text" id="nome-completo" name="nome-completo" required>
                </div>

                <div class="item-formulario coluna2">
                    <label for="email-do-usuario">E-mail:</label>
                    <input type="email" id="email-do-usuario" name="email-do-usuario" required>
                </div>

            </fieldset>

            <fieldset>
                <legend>Perguntas</legend>
                <div class="item-formulario coluna1">
                    <label for="navegador">Qual é o seu navegador favorito?</label>
                    <select name="navegador" id="navegador">
                        <option value="Google">Google</option>
                        <option value="FireFox">FireFox</option>
                        <option value="Edge">Edge</option>
                    </select>
                </div>

                <div class="item-formulario coluna1">
                    <label for="pet">Você tem algum bichinho de estimação?</label>
                    <input type="checkbox" id="pet" name="pet">
                </div>

                <div class="item-formulario ">
                    <label for="feedback">Informe os lugares onde você morou:</label>
                    <textarea name="feedback" id="feedback" rows="4"
                        placeholder="São Paulo, New York, Lisboa"></textarea>
                </div>

            </fieldset>

            <button type="submit">Enviar Pesquisa</button>
        </form>
    </main>

    <footer>
        <p>©2026 | Formulário HTML | Atividade de Pesquisa de Usuário | Sarah Nascimento</p>
    </footer>

</body>

</html>
