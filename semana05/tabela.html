<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/tabela.css">
    <title>Tabela</title>
</head>

<body>
    <table>
        <caption>Jogo Principal</caption>
        <thead>
            <tr>
                <th>Liga</th>
                <th>Time</th>
                <th>Retrospecto (vitórias–derrotas)</th>
                <th>Número de Jogadores</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th rowspan="2">Sul</th>
                <td>Paraná</td>
                <td>52-19</td>
                <td>23</td>
            </tr>

            <tr>
                <td>Santa Catarina</td>
                <td>49-24</td>
                <td>10</td>
            </tr>
            <tr>
                <th rowspan="3">Oeste</th>
                <td>Lacerda</td>
                <td>92-70</td>
                <td>27</td>
            </tr>
            <tr>
                <td>Acre</td>
                <td>75-87</td>
                <td>20</td>
            </tr>
            <tr>
                <td>Rondônia</td>
                <td>10-7</td>
                <td>12</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="3">Total de Jogadores</th>
                <td>92</td>
            </tr>
        </tfoot>

    </table>
</body>

</html>
